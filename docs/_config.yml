# Learn more at https://jupyterbook.org/customize/config.html

title: tsgroup
author: Yan Wong
copyright: "2026"
only_build_toc_files: true

execute:
  execute_notebooks: "off"

repository:
  url: https://github.com/hyanwong/tsgroup
  branch: main
  path_to_book: docs

html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true

sphinx:
  extra_extensions:
    - sphinx_copybutton
    - sphinx.ext.autodoc
    - sphinx.ext.autosummary
    - sphinx.ext.napoleon
    - sphinx.ext.viewcode
    - sphinx.ext.intersphinx
    - sphinx_issues

  config:
    html_theme: sphinx_book_theme
    html_theme_options:
      pygments_dark_style: monokai
      navigation_with_keys: false
      logo:
        text: "tsgroup"
    pygments_style: monokai
    myst_enable_extensions:
      - colon_fence
      - deflist
    issues_github_path: hyanwong/tsgroup
    autodoc_member_order: bysource
    # Avoid broken links from unresolved type hints
    autodoc_typehints: none
    napoleon_numpy_docstring: true
    napoleon_google_docstring: false
    napoleon_use_rtype: false
    napoleon_use_param: false
    intersphinx_mapping:
      python: ["https://docs.python.org/3/", null]
      tskit: ["https://tskit.dev/tskit/docs/stable", null]
      msprime: ["https://tskit.dev/msprime/docs/stable", null]
      numpy: ["https://numpy.org/doc/stable/", null]
